<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>安装优雅大师</title>
    <style>
        body { font-family: sans-serif; padding: 50px; text-align: center; }
        button { padding: 20px 40px; font-size: 18px; background: #667eea; color: white; border: none; border-radius: 8px; cursor: pointer; }
        button:hover { background: #764ba2; }
        #status { margin-top: 20px; font-size: 14px; color: #666; }
        textarea { width: 80%; height: 200px; margin: 20px auto; display: block; font-family: monospace; }
    </style>
</head>
<body>
    <h1>🌟 优雅大师 - 一键安装</h1>
    <p>点击下方按钮，将在 Tampermonkey 中安装开发版脚本（热更新）</p>

    <a href="userscript:http://localhost:8081/dev.user.js">
        <button>👉 安装到 Tampermonkey</button>
    </a>

    <div id="status"></div>

    <h3>如果按钮无效，手动复制下方代码到 Tampermonkey：</h3>
    <textarea readonly id="code"></textarea>

    <script>
        // 自动获取 dev.user.js 内容填入文本框
        fetch('http://localhost:8081/dev.user.js')
            .then(r => r.text())
            .then(text => {
                document.getElementById('code').value = text;
                document.getElementById('status').textContent = '✅ 脚本已加载，可以手动复制安装';
            })
            .catch(() => {
                document.getElementById('status').textContent = '❌ 无法连接到本地服务器，请确认 localhost:8081 已启动';
            });
    </script>
</body>
</html>
